<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Create Password — Dispatch</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  </head>
  <body style="font-family:system-ui;max-width:720px;margin:48px auto;padding:0 16px;line-height:1.4;background:#fff;color:#111;">
    <h1>Create Your Password</h1>

    <p style="color:#555">
      Almost done! Create a secure password for your account.
    </p>

    {% if error %}
      <p style="padding:10px 12px;background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;color:#991b1b;">
        {{ error }}
      </p>
    {% endif %}

    <form method="post" action="/auth/register/password" style="margin-top:18px">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <label style="display:block;margin-bottom:6px"><strong>Password</strong></label>
      <input
        type="password"
        name="password"
        required
        minlength="8"
        style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box"
        placeholder="At least 8 characters"
      />
      <p style="margin:6px 0 16px;font-size:0.85em;color:#666">
        Must be at least 8 characters with at least one letter and one number.
      </p>

      <label style="display:block;margin-bottom:6px"><strong>Confirm Password</strong></label>
      <input
        type="password"
        name="confirm_password"
        required
        minlength="8"
        style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box"
        placeholder="Re-enter your password"
      />

      <div style="height:16px"></div>

      <label style="display:flex;align-items:center;cursor:pointer">
        <input type="checkbox" name="remember_me" value="true" style="margin-right:8px" checked />
        <span>Remember me on this device (7 days)</span>
      </label>

      <div style="height:16px"></div>

      <button
        type="submit"
        style="padding:10px 18px;border:0;border-radius:10px;background:#111;color:#fff;cursor:pointer;font-size:1em"
      >
        Create Account
      </button>
    </form>
      {% include "partials/footer.html" %}
</body>
</html>
