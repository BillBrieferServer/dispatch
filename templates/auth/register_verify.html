<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Verify Email — Dispatch</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  </head>
  <body style="font-family:system-ui;max-width:720px;margin:48px auto;padding:0 16px;line-height:1.4;background:#fff;color:#111;">
    <h1>Verify Your Email</h1>

    <p style="color:#555">
      We sent a 6-digit code to <strong>{{ masked_email }}</strong>.
      <br>Enter the code below to continue.
    </p>

    {% if error %}
      <p style="padding:10px 12px;background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;color:#991b1b;">
        {{ error }}
      </p>
    {% endif %}

    <form method="post" action="/auth/register/verify" style="margin-top:18px">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <label style="display:block;margin-bottom:6px"><strong>Verification Code</strong></label>
      <input
        type="text"
        name="code"
        required
        maxlength="6"
        pattern="[0-9]{6}"
        inputmode="numeric"
        autocomplete="one-time-code"
        style="width:200px;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:1.2em;letter-spacing:4px;text-align:center"
        placeholder="000000"
      />

      <div style="height:16px"></div>

      <button
        type="submit"
        style="padding:10px 18px;border:0;border-radius:10px;background:#111;color:#fff;cursor:pointer;font-size:1em"
      >
        Verify Code
      </button>
    </form>

    <p style="margin-top:24px;font-size:0.9em;color:#555">
      Didn't receive the code? 
      <a href="#" onclick="resendCode(); return false;" style="color:#111;font-weight:500">Resend code</a>
    </p>

    <p style="margin-top:18px;">
      <a href="/auth/register" style="color:#111">← Use a different email</a>
    </p>

    <script>
    function resendCode() {
      fetch('/auth/resend-code/signup', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
          alert('A new code has been sent to your email.');
        })
        .catch(() => {
          alert('Could not resend code. Please try again.');
        });
    }
    </script>
      {% include "partials/footer.html" %}
</body>
</html>
