<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Verify Login — Dispatch</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <style>
      body { font-family: system-ui; max-width: 400px; margin: 80px auto; padding: 0 16px; line-height: 1.4; }
      h1 { margin-bottom: 8px; font-size: 1.5em; }
      .subtitle { color: #555; margin-bottom: 24px; }
      form { display: flex; flex-direction: column; gap: 16px; }
      label { font-weight: 500; display: block; margin-bottom: 4px; }
      input[type="text"] { width: 100%; padding: 12px; font-size: 1.2em; border: 1px solid #ccc; border-radius: 6px; text-align: center; letter-spacing: 0.3em; box-sizing: border-box; }
      input[type="text"]:focus { outline: none; border-color: #111; }
      .checkbox-group { display: flex; align-items: flex-start; gap: 10px; margin-top: 8px; }
      .checkbox-group input[type="checkbox"] { margin-top: 3px; width: 18px; height: 18px; }
      .checkbox-group label { font-weight: normal; cursor: pointer; }
      .checkbox-description { font-size: 0.85em; color: #666; margin-left: 28px; margin-top: -8px; }
      button { background: #111; color: #fff; padding: 12px 24px; border: none; border-radius: 6px; font-size: 1em; cursor: pointer; }
      button:hover { background: #333; }
      .error { background: #fee; color: #c00; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
      .help-text { font-size: 0.9em; color: #666; margin-top: 8px; }
      .resend-link { color: #111; text-decoration: underline; cursor: pointer; }
      .back-link { margin-top: 24px; text-align: center; }
      .back-link a { color: #555; text-decoration: none; }
      .back-link a:hover { text-decoration: underline; }
      hr { border: none; border-top: 1px solid #e5e7eb; margin: 20px 0; }
    </style>
  </head>
  <body>
    <h1>Verify Your Login</h1>
    <p class="subtitle">We sent a 6-digit code to {{ masked_email }}</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/auth/login/verify">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <div>
        <label for="code">Verification Code</label>
        <input type="text" id="code" name="code" maxlength="6" pattern="[0-9]{6}" required autofocus autocomplete="one-time-code" inputmode="numeric" placeholder="000000">
      </div>

      <hr>

      <div class="checkbox-group">
        <input type="checkbox" id="trust_device" name="trust_device" value="true">
        <label for="trust_device">Trust this device</label>
      </div>
      <p class="checkbox-description">Skip verification codes on this browser for 30 days</p>

      <div class="checkbox-group">
        <input type="checkbox" id="remember_me" name="remember_me" value="true">
        <label for="remember_me">Remember me</label>
      </div>

      <input type="hidden" name="remember_days" value="7">

      <button type="submit">Verify</button>
    </form>

    <p class="help-text">
      Didn't receive the code? <span class="resend-link" onclick="resendCode()">Resend code</span>
    </p>

    <div class="back-link">
      <a href="/auth/login">&larr; Back to login</a>
    </div>

    <script>
      async function resendCode() {
        try {
          const response = await fetch('/auth/resend-code/login', { method: 'POST' });
          const data = await response.json();
          if (data.success) {
            alert('A new code has been sent to your email.');
          } else {
            alert(data.detail || 'Failed to resend code. Please try again.');
          }
        } catch (error) {
          alert('Failed to resend code. Please try again.');
        }
      }
    </script>
      {% include "partials/footer.html" %}
</body>
</html>
