<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Reset Password — Dispatch</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  </head>
  <body style="font-family:system-ui;max-width:720px;margin:48px auto;padding:0 16px;line-height:1.4;background:#fff;color:#111;">
    <h1>Reset Password</h1>

    <p style="color:#555">
      Enter your email address and we'll send you a verification code to reset your password.
    </p>

    {% if success %}
      <p style="padding:10px 12px;background:#d1fae5;border:1px solid #6ee7b7;border-radius:10px;color:#065f46;">
        {{ success }}
      </p>
    {% endif %}

    {% if error %}
      <p style="padding:10px 12px;background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;color:#991b1b;">
        {{ error }}
      </p>
    {% endif %}

    <form method="post" action="/auth/reset-password" style="margin-top:18px">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <label style="display:block;margin-bottom:6px"><strong>Email</strong></label>
      <input
        type="email"
        name="email"
        required
        style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box"
        placeholder="you@legislature.idaho.gov"
      />

      <div style="height:16px"></div>

      <button
        type="submit"
        style="padding:10px 18px;border:0;border-radius:10px;background:#111;color:#fff;cursor:pointer;font-size:1em"
      >
        Send Reset Code
      </button>
    </form>

    <p style="margin-top:18px;">
      <a href="/auth/login" style="color:#111">← Back to sign in</a>
    </p>
      {% include "partials/footer.html" %}
</body>
</html>
