<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Create Account — Idaho Bill Briefer</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  </head>
  <body style="font-family:system-ui;max-width:720px;margin:48px auto;padding:0 16px;line-height:1.4;background:#fff;color:#111;">
    <h1>Create Your Account</h1>

    <p style="color:#555">
      Enter your authorized email address to get started.
    </p>

    {% if error %}
      <p style="padding:10px 12px;background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;color:#991b1b;">
        {{ error }}
      </p>
    {% endif %}

    <form method="post" action="/auth/register" style="margin-top:18px">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <label style="display:block;margin-bottom:6px"><strong>Email</strong></label>
      <input
        type="email"
        name="email"
        required
        value="{{ email or '' }}"
        style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box"
        placeholder="Your email address"
      />

      <div style="height:16px"></div>

      <button
        type="submit"
        style="padding:10px 18px;border:0;border-radius:10px;background:#111;color:#fff;cursor:pointer;font-size:1em"
      >
        Send Verification Code
      </button>
    </form>

    <p style="margin-top:24px;font-size:0.9em;color:#555">
      A 6-digit verification code will be sent to your email.
    </p>

    <p style="margin-top:18px;">
      Already have an account? <a href="/auth/login" style="color:#111;font-weight:500">Sign in</a>
    </p>

    <p style="margin-top:18px;">
      <a href="/" style="color:#111">← Back to home</a>
    </p>

    {% include "partials/footer.html" %}
  </body>
</html>
